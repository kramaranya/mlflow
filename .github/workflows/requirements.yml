name: requirements

on:
  pull_request:
    branches:
      - master
    paths:
      - pyproject.toml
      - uv.lock
      - requirements.txt
      - .github/workflows/requirements.yml
  push:
    branches:
      - master
    paths:
      - pyproject.toml
      - uv.lock
      - requirements.txt
      - .github/workflows/requirements.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  check:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/setup-python
      - name: Verify requirements.txt is in sync with uv.lock
        run: |
          uv export --no-hashes --no-editable --no-emit-workspace --package mlflow > requirements.txt.expected
          if ! diff -q requirements.txt requirements.txt.expected > /dev/null 2>&1; then
            echo "ERROR: requirements.txt is out of sync with uv.lock"
            echo ""
            echo "To fix, run:"
            echo "  uv export --no-hashes --no-editable --no-emit-workspace --package mlflow > requirements.txt"
            echo ""
            echo "Diff:"
            diff requirements.txt requirements.txt.expected || true
            exit 1
          fi
          echo "requirements.txt is up to date"
