apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/opendatahub-io/mlflow?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    build.appstudio.redhat.com/pull_request_number: '{{pull_request_number}}'
    pipelinesascode.tekton.dev/cancel-in-progress: "false"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: event == "pull_request" && target_branch
      == "master"
  creationTimestamp: null
  labels:
    appstudio.openshift.io/application: opendatahub-builds
    appstudio.openshift.io/component: mlflow-ci
    pipelines.appstudio.openshift.io/type: build
  name: mlflow-on-pull-request
  namespace: open-data-hub-tenant
spec:
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: output-image
    value: quay.io/opendatahub/mlflow:odh-pr
  - name: dockerfile
    value: Dockerfile.konflux
  - name: path-context
    value: .
  - name: additional-tags
    value:
    - 'odh-pr-{{revision}}'
  # TODO: Enable hermetic builds once yarn/npm prefetching is supported.
  - name: hermetic
    value: 'false'
  - name: prefetch-input
    value: '[{"type": "pip", "path": ".", "requirements_files": ["requirements/konflux-pypi.txt"]}, {"type": "rpm", "path": "requirements"}]'
  - name: pipeline-type
    value: pull-request
  - name: build-platforms
    value:
    - linux-extra-fast/amd64
    - linux-m2xlarge/arm64
    - linux/ppc64le
  pipelineRef:
    resolver: git
    params:
    - name: url
      value: https://github.com/opendatahub-io/odh-konflux-central.git
    - name: revision
      value: main
    - name: pathInRepo
      value: pipeline/multi-arch-container-build.yaml
  taskRunTemplate:
    serviceAccountName: build-pipeline-mlflow
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}
